name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint & Type Check
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install black==23.12.1 isort==5.13.2 flake8 mypy

      - name: Black check
        run: black --check --diff src/ tests/ --line-length 100

      - name: isort check
        run: isort --check-only --diff src/ tests/ --profile black --line-length 100

      - name: Flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length 100 \
            --extend-ignore E203,W503,E501 \
            --exclude tests/pytest_compat.py

      - name: Mypy
        run: mypy src/adversarial_robustness --ignore-missing-imports

  # ─────────────────────────────────────────────────────────────────────────
  # Unit Tests — all three Python versions
  # ─────────────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy scipy Pillow pyyaml pytest pytest-cov

      - name: Install package (no torch needed for unit tests)
        run: pip install --no-deps -e .

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --cov=adversarial_robustness \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not gpu and not slow"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage.xml

  # ─────────────────────────────────────────────────────────────────────────
  # Integration Tests
  # ─────────────────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy scipy Pillow pyyaml pytest pytest-cov

      - name: Install package
        run: pip install --no-deps -e .

      - name: Run integration tests
        run: pytest tests/integration/ -v

  # ─────────────────────────────────────────────────────────────────────────
  # Smoke Test — run benchmark script end-to-end
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: test-unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy scipy Pillow pyyaml

      - name: Add src to PYTHONPATH and run benchmark
        run: PYTHONPATH=src python scripts/run_benchmark.py --samples 50 --pgd-steps 5

  # ─────────────────────────────────────────────────────────────────────────
  # Build Check
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Verify dist
        run: ls -lh dist/