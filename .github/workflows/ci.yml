name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint & Type Check
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy

      - name: Black formatting check
        run: black --check --diff src/ tests/

      - name: isort import ordering check
        run: isort --check-only --diff src/ tests/

      - name: Flake8 style check
        run: flake8 src/ tests/

      - name: Mypy type check
        run: mypy src/adversarial_robustness --ignore-missing-imports

  # ─────────────────────────────────────────────────────────────────────────
  # Unit Tests (CPU, no GPU required)
  # ─────────────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (CPU-only)
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy Pillow pyyaml
          pip install pytest pytest-cov

      - name: Install package (editable)
        run: pip install -e ".[dev]" --no-deps

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=adversarial_robustness \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not gpu"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage.xml

  # ─────────────────────────────────────────────────────────────────────────
  # Integration Tests
  # ─────────────────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy Pillow pyyaml pytest pytest-cov

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v -m "integration"

  # ─────────────────────────────────────────────────────────────────────────
  # Smoke test — run the benchmark script end-to-end
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (Benchmark Script)
    runs-on: ubuntu-latest
    needs: test-unit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy Pillow pyyaml

      - name: Run benchmark script
        run: python scripts/run_benchmark.py --samples 50 --pgd-steps 5

  # ─────────────────────────────────────────────────────────────────────────
  # Build check
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Check dist
        run: ls -lh dist/
